  <!-- Bootstrap & BaguetteBox CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
    integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">

  <!-- Added AOS Library CSS for animations -->

  <style>
    body, html {
      background: #191919;
      height: 100%;
    }
    
    main {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /* Remove all spacing around the gallery */
    .gallery-container,
    .tz-gallery,
    #gallery,
    #gallery .container {
      padding: 0 !important;
      margin: 0 !important;
    }
    
    /* FLEX CONTAINER */
    .tz-gallery .row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin: 0;
      padding: 0;
    }
    
    /* GALLERY ITEM */
    .gallery-item {
      flex: 1 1 350px;
      max-width: 600px;
      display: flex;
      justify-content: center;
    }
    
    /* THUMBNAIL BEHAVIOR (Consolidated) */
    .thumbnail {
      width: 100%;
      transition: transform 0.25s ease-in-out;
      margin: 0 !important;
      border: none !important;
      background-color: #191919;
      padding: 0;
      margin-bottom: 30px;
      border-radius: 4px;
      box-shadow: none !important;
    }

    .thumbnail:hover {
      transform: scale(1.05);
    }
    
    #gallery .row > div {
      padding: 0 !important;
      margin: 0 !important;
    }

    /* Restored pointer-events so lightbox works */
    .thumbnail a {
      cursor: pointer;
    }

    .baguetteBox-button {
      background-color: transparent !important;
    }

    /* Maintain 8:3 aspect ratio */
    .image-wrapper {
      width: 100%;
      aspect-ratio: 8 / 3;
      overflow: hidden;
      border-radius: 4px;
      background: #191919;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
  </style>
</head>
